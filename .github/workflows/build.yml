name: Build x86 Image

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to build (e.g., uefi-x86, mangopi-m28k)'
        required: true
        default: 'uefi-x86'
  push:
    branches:
      - main
    paths:
      - 'userpatches/**'
      - 'build.sh'
      - 'build.env'
      - '.github/workflows/**'

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          echo "After cleanup:"
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils rsync curl git

      - name: Build Armbian Image
        run: |
          # Use the input board or default to uefi-x86
          SELECTED_BOARD="${{ github.event.inputs.board || 'uefi-x86' }}"
          echo "Building for board: $SELECTED_BOARD"
          sudo ./build.sh "$SELECTED_BOARD"

      - name: Prepare Artifacts
        run: |
          mkdir -p final_output
          # Copy images and vmdk files
          cp armbian/output/images/*.img* final_output/ 2>/dev/null || true
          cp armbian/output/images/*.vmdk final_output/ 2>/dev/null || true
          echo "Contents of final_output:"
          ls -lh final_output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: landscape-image-${{ github.event.inputs.board || 'uefi-x86' }}
          path: final_output/
