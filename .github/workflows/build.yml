name: Build x86 Image

on:
  workflow_dispatch:
    inputs:
      board:
        description: 'Board to build (e.g., uefi-x86, mangopi-m28k)'
        required: true
        default: 'uefi-x86'
  push:
    branches:
      - main
      - ci
    paths:
      - 'userpatches/**'
      - 'build.sh'
      - 'build.env'
      - '.github/workflows/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Maximize build space
        run: |
          echo "Before cleanup:"
          df -h
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/.ghcup
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/local/lib/node_modules
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          sudo apt-get purge -y azure-cli google-cloud-sdk google-chrome-stable firefox powershell mono-devel || true
          sudo apt-get autoremove -y
          sudo docker image prune -a -f
          sudo docker system prune -a -f --volumes
          echo "After cleanup:"
          df -h

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-utils qemu-user-static binfmt-support rsync curl git xz-utils libelf-dev bc libssl-dev flex bison

      - name: Setup binfmt for cross-arch builds
        run: |
          sudo docker run --rm --privileged tonistiigi/binfmt --install arm64,arm,riscv64
          sudo update-binfmts --enable qemu-arm || true
          sudo update-binfmts --enable qemu-aarch64 || true
          sudo update-binfmts --enable qemu-riscv64 || true
          arch-test arm64 || true

      - name: Set Board Variable
        run: |
          SELECTED_BOARD="${{ github.event.inputs.board || 'uefi-x86' }}"
          echo "SELECTED_BOARD=$SELECTED_BOARD" >> $GITHUB_ENV
          echo "RELEASE_TAG=build-$(date +'%Y%m%d-%H%M%S')-$SELECTED_BOARD" >> $GITHUB_ENV

      - name: Move Project to /mnt and Build
        env:
          COLUMNS: 160
        run: |
          echo "Building for board: $SELECTED_BOARD"
          BUILD_ROOT="/mnt/landscape-build"
          sudo mkdir -p "$BUILD_ROOT"
          sudo chown runner:runner "$BUILD_ROOT"
          cp -r . "$BUILD_ROOT/"
          cd "$BUILD_ROOT"
          ./build.sh "$SELECTED_BOARD"
          echo "IMAGE_DIR=$BUILD_ROOT/armbian/output/images" >> $GITHUB_ENV

      - name: Prepare Artifacts
        run: |
          mkdir -p final_output
          echo "Compressing images from $IMAGE_DIR..."

          ASSET_BASENAME="armbian-landscape-router-${SELECTED_BOARD}"

          if [ -d "$IMAGE_DIR" ]; then
            cd "$IMAGE_DIR"
            idx=0
            for f in *.img *.vmdk; do
              if [ -f "$f" ]; then
                ext="${f##*.}"
                echo "Compressing $f..."
                if xz -c -v -T0 -9 "$f" > "$f.xz"; then
                  rm -f "$f"
                else
                  rm -f "$f.xz"
                  exit 1
                fi
                if [ "$idx" -eq 0 ]; then
                  NEW_NAME="${ASSET_BASENAME}.${ext}.xz"
                else
                  NEW_NAME="${ASSET_BASENAME}-${idx}.${ext}.xz"
                fi
                mv "$f.xz" "$NEW_NAME"
                idx=$((idx+1))
              fi
            done
            cd -
            mv "$IMAGE_DIR"/*.xz "$GITHUB_WORKSPACE/final_output/" 2>/dev/null || true
          else
            echo "Error: Directory $IMAGE_DIR does not exist."
            exit 1
          fi

          echo "Contents of final_output:"
          ls -lh final_output/

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: landscape-image-${{ env.SELECTED_BOARD }}
          path: final_output/

      # ★ 关键步骤：把 final_output 里的文件作为 Release 资产上传
      - name: Create Release with Image Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: "landscape-image-${{ env.SELECTED_BOARD }}"
          body: |
            **Board**: `${{ env.SELECTED_BOARD }}`
            **Commit**: ${{ github.sha }}

            下方 Assets 中即为构建产物（与 Actions Artifact `landscape-image-${{ env.SELECTED_BOARD }}` 内容一致）。
          files: |
            final_output/*.xz
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
