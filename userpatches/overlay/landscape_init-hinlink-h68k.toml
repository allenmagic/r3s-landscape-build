# Config Interface
[[ifaces]]
name = "enP1p1s0"
zone_type = "wan"
enable_in_boot = true

[[ipconfigs]]
iface_name = "enP1p1s0"
enable = true

[ipconfigs.ip_model]
t = "dhcpclient"
default_router = true

[[ifaces]]
name = "eth0"
enable_in_boot = true
controller_name = "br_lan"

[[ifaces]]
name = "eth1"
enable_in_boot = true
controller_name = "br_lan"

[[ifaces]]
name = "br_lan"
create_dev_type = "bridge"
enable_in_boot = true
zone_type = "lan"

[[dhcpv4_services]]
iface_name = "br_lan"
enable = true

[dhcpv4_services.config]
server_ip_addr = "192.168.6.1"
ip_range_start = "192.168.6.100"
network_mask = 24
